server {
    listen 8080;
    server_name _;

    root /home/pi/garmin-dashboard/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
